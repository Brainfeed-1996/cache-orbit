version: "0.5.0"

global:
  scrape_interval: 5s
  evaluation_interval: 10s
  external_labels:
    cluster: "cache-orbit-local"
    region: "local"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "cache-engine"
    static_configs:
      - targets: ["cache-engine:9090"]
    metrics_path: /metrics
    scrape_interval: 2s

  - job_name: "nats"
    static_configs:
      - targets: ["nats:8222"]
    metrics_path: /varz
    scrape_interval: 10s

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:9187"]
    scrape_interval: 10s

rule_files:
  - "/etc/prometheus/rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["localhost:9093"]
