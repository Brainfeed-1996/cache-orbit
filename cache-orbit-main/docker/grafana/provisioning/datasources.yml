apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true

dashboards:
  - name: Cache Orbit Overview
    folder: Cache Orbit
    type: file
    options:
      path: /etc/grafana/provisioning/dashboards/cache-orbit-overview.json

  - name: Cache Engine Metrics
    folder: Cache Orbit
    type: file
    options:
      path: /etc/grafana/provisioning/dashboards/cache-engine-metrics.json
